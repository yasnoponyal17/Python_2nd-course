<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Пользователь {{ user.name }}</title>
</head>

<body>
	<h1>{{ user.name }}</h1>

	<h2>Подписки:</h2>

	<ul>
		{% for currency in currencies %}
		<li>
			{{ currency.name }} ({{ currency.char_code }}) - {{ currency.value }}
		</li>
		{% endfor %}
	</ul>
</body>

</html>
