<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Пользователи</title>
</head>
<body>
	<h1>Список пользователей</h1>
	<ul>
		{% for user in users %}
		<li>
			{{ user.name }} —
			<a href="/user?id={{ user.id }}">Открыть</a>
		</li>
		{% endfor %}
	</ul>
</body>
</html>
