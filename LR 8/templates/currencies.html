<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Курсы валют</title>
</head>

<body>
	<div class="currencies__content">
		{% for currency in currencies %}
		<div class="currency">
			<h3>{{ currency.name }}</h3>
			<p>Курс: {{ currency.value }}</p>
			<p>Номинал: {{ currency.nominal }}</p>
		</div>
		{% endfor %}
	</div>
</body>

</html>
